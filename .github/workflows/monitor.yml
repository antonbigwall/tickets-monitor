name: Ticket Monitor
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
permissions:
  contents: write
concurrency:
  group: monitor
  cancel-in-progress: true
jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 330
    steps:
      - uses: actions/checkout@v5
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install requests
      - name: Monitor loop
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          for i in $(seq 1 130); do
            echo "=== Проверка номер $i ==="
            python monitor.py || true
            git pull --rebase || true
            git add last_hash.txt
            git diff --staged --quiet || git commit -m "update state"
            git push || true
            sleep 120
          done
      - name: Re-trigger self
        if: always()
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.WORKFLOW_PAT }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/monitor.yml/dispatches \
            -d '{"ref":"main"}'
